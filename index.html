<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Vienne</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    /* ===== THÈMES ===== */
    :root[data-theme="dark"] {
      --bg: #0d0f12; --bg2: #13161a; --bg3: #1c2029; --border: #252b35;
      --text: #eef1f6; --muted: #5a6272; --muted2: #2e3445;
      --red: #ff4444; --red-bg: rgba(255,68,68,0.08); --red-border: rgba(255,68,68,0.22);
      --amber: #ffaa00; --amber-bg: rgba(255,170,0,0.08); --amber-border: rgba(255,170,0,0.22);
      --accent: #3b9eff; --accent-bg: rgba(59,158,255,0.10);
      --blue: #3b9eff;
      --header-bg: rgba(13,15,18,0.95);
      --shadow: 0 2px 12px rgba(0,0,0,0.35);
    }
    :root[data-theme="light"] {
      --bg: #eef1f5; --bg2: #ffffff; --bg3: #e2e6ed; --border: #cdd2db;
      --text: #0d1117; --muted: #7a879c; --muted2: #c4cad5;
      --red: #d42020; --red-bg: rgba(212,32,32,0.06); --red-border: rgba(212,32,32,0.2);
      --amber: #c47d00; --amber-bg: rgba(196,125,0,0.06); --amber-border: rgba(196,125,0,0.2);
      --accent: #1a7fe0; --accent-bg: rgba(26,127,224,0.07);
      --blue: #1a7fe0;
      --header-bg: rgba(238,241,245,0.96);
      --shadow: 0 2px 10px rgba(0,0,0,0.08);
    }

    *, *::before, *::after {
      transition:
        background-color 0.9s ease,
        color 0.7s ease,
        border-color 0.7s ease,
        box-shadow 0.7s ease !important;
    }
    .loader-bar            { transition: width 0.3s linear !important; }
    .scroll-progress-fill  { transition: width 0.12s linear !important; }
    .scroll-dot            { transition: background-color 0.3s ease, transform 0.3s ease !important; }
    .arretes-inner         { transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1) !important; }
    .arretes-inner.no-transition { transition: none !important; }

    /* Slider à-venir */
    .slider-track          { transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1) !important; }
    .slider-track.no-anim  { transition: none !important; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
    }

    :root {
      --lieu-size:        clamp(14px, 2.6vw, 30px);
      --meta-size:        clamp(11px, 1.8vw, 20px);
      --pill-size:        clamp(9px,  1.4vw, 16px);
      --clock-size:       clamp(32px, 7vw,   80px);
      --date-size:        clamp(10px, 1.5vw, 18px);
      --label-size:       clamp(9px,  1.5vw, 16px);
      --count-size:       clamp(9px,  1.3vw, 15px);
      --pill-val-size:    clamp(16px, 3.2vw, 38px);
      --pill-label-size:  clamp(8px,  1.2vw, 13px);
      --pill-sub-size:    clamp(8px,  1.2vw, 13px);
      --card-padding-v:   clamp(10px, 1.2vh, 18px);
      --card-gap:         clamp(6px,  0.8vh, 12px);
      --section-gap:      clamp(5px,  0.7vh, 12px);
      --app-padding:      clamp(8px,  1.2vw, 18px);
      --badge-size:       clamp(9px,  1.3vw, 15px);
    }

    .loader-bar {
      position: fixed; top: 0; left: 0;
      height: 3px; width: 0%;
      background: var(--accent);
      z-index: 300;
    }

    /* ===== LAYOUT ===== */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: var(--app-padding);
      gap: var(--section-gap);
    }

    /* ===== HORLOGE ===== */
    .clock-section {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: var(--section-gap);
      border-bottom: 2px solid var(--border);
      gap: 8px;
    }

    .clock-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: var(--clock-size);
      line-height: 1;
      letter-spacing: 0.05em;
      color: var(--text);
      flex-shrink: 0;
    }

    .clock-date {
      font-size: var(--date-size);
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      flex: 1;
      text-align: center;
      padding: 0 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-btns {
      display: flex;
      gap: clamp(4px, 0.6vw, 8px);
      flex-shrink: 0;
    }

    .icon-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: clamp(3px, 0.5vh, 6px) clamp(8px, 1.1vw, 14px);
      font-size: clamp(12px, 1.9vw, 22px);
      cursor: pointer;
      line-height: 1.4;
      color: var(--text);
    }
    .icon-btn:hover  { background: var(--border); }
    .icon-btn:active { transform: scale(0.95); }

    /* ===== SECTION ARRÊTÉS ===== */
    .arretes-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: var(--card-gap);
    }

    /* ===== HEADER DE SECTION ===== */
    .section-header {
      display: flex;
      align-items: center;
      gap: clamp(5px, 0.8vw, 10px);
      flex-shrink: 0;
      padding: clamp(4px,0.5vh,7px) clamp(6px,0.8vw,10px);
      border-radius: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
    }

    .section-header.en-cours-header { border-left: 4px solid var(--red); }
    .section-header.a-venir-header  { border-left: 4px solid var(--amber); }

    .dot {
      width: clamp(7px, 1.1vw, 11px);
      height: clamp(7px, 1.1vw, 11px);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.red   { background: var(--red);   box-shadow: 0 0 7px var(--red);   animation: pulse 2s infinite; }
    .dot.amber { background: var(--amber); box-shadow: 0 0 5px var(--amber); }

    .section-header .label {
      font-size: var(--label-size);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
    }

    .section-header .count {
      margin-left: auto;
      font-size: var(--count-size);
      font-weight: 700;
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 2px clamp(7px, 1vw, 12px);
      border-radius: 20px;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* Dots de pagination — en-cours */
    .scroll-dots {
      display: none;
      gap: 4px;
      margin-left: 6px;
      align-items: center;
    }
    .scroll-dots.visible { display: flex; }
    .scroll-dot {
      width: clamp(5px, 0.7vw, 8px);
      height: clamp(5px, 0.7vw, 8px);
      border-radius: 50%;
      background: var(--border);
    }
    .scroll-dot.active {
      background: var(--accent);
      transform: scale(1.3);
    }

    /* Barre de progression — en-cours */
    .scroll-progress-bar {
      height: 3px;
      background: var(--muted2);
      border-radius: 3px;
      flex-shrink: 0;
      overflow: hidden;
      opacity: 0;
    }
    .scroll-progress-bar.visible { opacity: 1; }
    .scroll-progress-fill {
      height: 100%;
      border-radius: 3px;
      width: 0%;
    }
    .fill-red   { background: var(--red); }
    .fill-amber { background: var(--amber); }

    /* ===== GROUPE EN-COURS — prioritaire, grande hauteur ===== */
    .en-cours-group {
      flex: 3;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    .arretes-inner {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: var(--card-gap);
    }

    /* ===== SÉPARATEUR ===== */
    .divider {
      height: 1px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ===== SECTION À-VENIR — compacte, slider ===== */
    .a-venir-section {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: var(--card-gap);
      min-height: 0;
    }

    /* Slider container : une seule carte visible */
    .slider-viewport {
      overflow: hidden;
      position: relative;
      border-radius: 10px;
      /* hauteur = une carte, calculée dynamiquement */
    }

    .slider-track {
      display: flex;
      flex-direction: row;
      width: 100%;
      /* largeur totale = nb cartes × 100% */
    }

    .slider-card {
      flex-shrink: 0;
      width: 100%;
      background: var(--amber-bg);
      border: 1px solid var(--amber-border);
      border-left: 4px solid var(--amber);
      border-radius: 10px;
      padding: clamp(5px, 0.7vh, 9px) clamp(8px, 1.2vw, 14px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: clamp(2px, 0.3vh, 4px);
      /* Hauteur fixe compacte : une card standard */
      max-height: clamp(70px, 12vh, 120px);
      overflow: hidden;
    }

    /* Texte réduit dans le slider à-venir */
    .slider-card .arrete-lieu  { font-size: clamp(11px, 1.5vw, 18px); line-height: 1.2; }
    .slider-card .arrete-dates { font-size: clamp(9px,  1.1vw, 13px); }
    .slider-card .arrete-motif { font-size: clamp(9px,  1.1vw, 13px); opacity: 0.8; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .slider-card .badge-statut { font-size: clamp(8px,  1.0vw, 11px); padding: 1px 6px; }

    /* Indicateurs slider à-venir dans le header */
    .slider-indicators {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-left: 8px;
    }

    .slider-pip {
      width: clamp(5px, 0.7vw, 8px);
      height: clamp(5px, 0.7vw, 8px);
      border-radius: 50%;
      background: var(--muted2);
      flex-shrink: 0;
    }
    .slider-pip.active {
      background: var(--amber);
      transform: scale(1.3);
    }

    /* Barre de progression slider à-venir */
    .slider-progress-bar {
      height: 3px;
      background: var(--muted2);
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .slider-progress-fill {
      height: 100%;
      background: var(--amber);
      border-radius: 3px;
      width: 0%;
      transition: width 0.06s linear !important;
    }

    /* ===== CARTE ARRÊTÉ ===== */
    .arrete-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: clamp(10px, 1.4vh, 18px) clamp(10px, 1.4vw, 18px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: clamp(5px, 0.7vh, 9px);
    }
    .arrete-card.en-cours {
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-left: 4px solid var(--red);
    }

    .arrete-top {
      display: flex;
      align-items: flex-start;
      gap: clamp(6px, 0.8vw, 10px);
      flex-wrap: wrap;
    }

    .badge-statut {
      display: inline-flex;
      align-items: center;
      font-size: var(--badge-size);
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: clamp(2px,0.3vh,4px) clamp(7px,0.9vw,11px);
      border-radius: 6px;
      flex-shrink: 0;
      line-height: 1.5;
    }
    .badge-statut.red   { background: var(--red);   color: #fff; }
    .badge-statut.amber { background: var(--amber); color: #fff; }

    .arrete-lieu {
      font-weight: 700;
      font-size: var(--lieu-size);
      color: var(--text);
      line-height: 1.25;
      flex: 1;
      word-break: break-word;
    }

    .arrete-dates {
      font-size: var(--meta-size);
      color: var(--muted);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      line-height: 1.4;
    }

    .date-sep { opacity: 0.5; }

    .arrete-motif {
      font-size: var(--meta-size);
      color: var(--text);
      font-weight: 400;
      line-height: 1.45;
      word-break: break-word;
      opacity: 0.85;
    }

    .empty-msg {
      font-size: var(--meta-size);
      color: var(--muted2);
      font-style: italic;
      padding: clamp(6px, 0.8vh, 10px) 0;
    }

    /* ===== BARRE INFÉRIEURE ===== */
    .info-bar {
      flex-shrink: 0;
      display: flex;
      gap: clamp(5px, 0.8vw, 12px);
    }

    .info-pill {
      flex: 1;
      min-width: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: clamp(8px, 1.2vw, 14px);
      padding: clamp(6px, 1vh, 12px) clamp(8px, 1.3vw, 16px);
      display: flex;
      align-items: center;
      gap: clamp(6px, 0.9vw, 12px);
      box-shadow: var(--shadow);
    }

    .pill-icon {
      font-size: clamp(18px, 3vw, 32px);
      flex-shrink: 0;
      line-height: 1;
    }

    .pill-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .pill-label {
      font-size: var(--pill-label-size);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .station-num {
      font-size: clamp(7px, 1vw, 11px);
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: none;
      color: var(--muted2);
      opacity: 0.8;
    }

    .pill-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: var(--pill-val-size);
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pill-value.blue   { color: var(--blue); }
    .pill-value.accent { color: var(--accent); }

    .pill-value .unit {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(9px, 1.3vw, 15px);
      font-weight: 400;
      color: var(--muted);
    }

    .pill-sub {
      font-size: var(--pill-sub-size);
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rhone-level-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(2px, 0.3vh, 4px);
      flex-shrink: 0;
      height: 100%;
      justify-content: center;
    }

    .rhone-level-bar {
      width: clamp(7px, 1.1vw, 12px);
      height: clamp(38px, 6.5vh, 76px);
      background: var(--bg3);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--border);
    }

    .rhone-level-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      border-radius: 99px;
      transition: height 1.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.9s ease;
    }

    .rhone-level-bar::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      bottom: 22%;
      height: 1px;
      background: var(--border);
      opacity: 0.7;
    }

    .rhone-level-pct {
      font-size: clamp(7px, 1vw, 11px);
      font-weight: 700;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
    }

    #btn-fullscreen::before { content: '⛶'; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>

<div class="loader-bar" id="loader-bar"></div>

<div class="app">

  <!-- HORLOGE -->
  <div class="clock-section">
    <div class="clock-time" id="clock-time">00:00:00</div>
    <div class="clock-date" id="clock-date">—</div>
    <div class="header-btns">
      <button class="icon-btn" id="btn-theme" title="Thème">🌙</button>
      <button class="icon-btn" id="btn-fullscreen" title="Plein écran"></button>
    </div>
  </div>

  <!-- ARRÊTÉS -->
  <div class="arretes-section" id="arretes-section">

    <!-- ===== EN COURS — section principale ===== -->
    <div class="section-header en-cours-header">
      <div class="dot red"></div>
      <span class="label">En cours</span>
      <div class="scroll-dots" id="dots-en-cours"></div>
      <span class="count" id="count-en-cours">—</span>
    </div>
    <div class="scroll-progress-bar" id="prog-en-cours">
      <div class="scroll-progress-fill fill-red" id="prog-fill-en-cours"></div>
    </div>
    <div class="en-cours-group" id="list-en-cours">
      <div class="arretes-inner" id="inner-en-cours">
        <div class="empty-msg">Chargement…</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- ===== À VENIR — slider compact ===== -->
    <div class="a-venir-section" id="a-venir-section">

      <div class="section-header a-venir-header">
        <div class="dot amber"></div>
        <span class="label">À venir</span>
        <!-- Indicateurs de slide -->
        <div class="slider-indicators" id="slider-indicators"></div>
        <span class="count" id="count-a-venir">—</span>
      </div>

      <!-- Barre de progression du slider -->
      <div class="slider-progress-bar" id="slider-progress-bar">
        <div class="slider-progress-fill" id="slider-progress-fill"></div>
      </div>

      <!-- Slider : une carte visible à la fois -->
      <div class="slider-viewport" id="slider-viewport">
        <div class="slider-track" id="slider-track">
          <div class="slider-card">
            <div class="arrete-top">
              <span class="badge-statut amber">À VENIR</span>
              <div class="arrete-lieu">Chargement…</div>
            </div>
          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- BARRE INFÉRIEURE -->
  <div class="info-bar">

    <div class="info-pill">
      <div class="pill-icon">🌊</div>
      <div class="pill-body">
        <div class="pill-label">Rhône · Ternay <span class="station-num" id="rhone-station"></span></div>
        <div class="pill-value blue" id="rhone-debit">—<span class="unit"> m³/s</span></div>
        <div class="pill-sub" id="rhone-heure">—</div>
      </div>
      <div class="rhone-level-wrap">
        <div class="rhone-level-bar">
          <div class="rhone-level-fill" id="rhone-level-fill" style="height:0%;background:var(--muted2)"></div>
        </div>
        <div class="rhone-level-pct" id="rhone-level-pct">—</div>
      </div>
    </div>

    <div class="info-pill">
      <div class="pill-icon" id="m-icon">⛅</div>
      <div class="pill-body">
        <div class="pill-label">Météo · Vienne</div>
        <div class="pill-value accent" id="m-temp">—<span class="unit">°C</span></div>
        <div class="pill-sub" id="m-cond">Chargement…</div>
      </div>
    </div>

  </div>

</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxo4Y50C5QbthOZy1rRC7pT9FPMRIhtJOCOjFmqp3rBEK6Tv4Md8fT629Nki4WPY7REWw/exec";

  // ===== HORLOGE =====
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;
    document.getElementById('clock-date').textContent = now.toLocaleDateString('fr-FR',{
      weekday:'long', day:'numeric', month:'long'
    });
    if (h==='07' && m==='01' && s==='00') chargerArretes();
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ===== THÈME =====
  const htmlEl   = document.documentElement;
  const btnTheme = document.getElementById('btn-theme');

  function estNuit() {
    const h = new Date().getHours();
    return h >= 20 || h < 7;
  }

  function appliquerTheme(theme, withTransition) {
    if (!withTransition) {
      document.body.style.transition = 'none';
      htmlEl.querySelectorAll('*').forEach(el => el.style.transition = 'none');
    }
    htmlEl.setAttribute('data-theme', theme);
    btnTheme.textContent = theme === 'dark' ? '☀️' : '🌙';
    btnTheme.title = theme === 'dark' ? 'Passer en clair' : 'Passer en sombre';
    if (!withTransition) {
      requestAnimationFrame(() => requestAnimationFrame(() => {
        document.body.style.transition = '';
        htmlEl.querySelectorAll('*').forEach(el => el.style.transition = '');
      }));
    }
  }

  let overrideTheme = localStorage.getItem('themeOverride') || null;
  let overrideUntil = parseInt(localStorage.getItem('themeOverrideUntil') || '0');

  function themeActuel() {
    const now = Date.now();
    if (overrideTheme && now < overrideUntil) return overrideTheme;
    return estNuit() ? 'dark' : 'light';
  }

  function verifierThemeAuto() {
    const attendu = estNuit() ? 'dark' : 'light';
    const actuel  = htmlEl.getAttribute('data-theme');
    if (actuel !== attendu) {
      const now = Date.now();
      if (!overrideTheme || now >= overrideUntil) {
        overrideTheme = null; overrideUntil = 0;
        localStorage.removeItem('themeOverride');
        localStorage.removeItem('themeOverrideUntil');
        appliquerTheme(attendu, true);
      }
    }
  }

  btnTheme.addEventListener('click', () => {
    const actuel = htmlEl.getAttribute('data-theme');
    const next   = actuel === 'dark' ? 'light' : 'dark';
    const now = new Date();
    const nextSwitch = new Date();
    if (next === 'dark') {
      nextSwitch.setHours(7, 0, 0, 0);
      if (nextSwitch <= now) nextSwitch.setDate(nextSwitch.getDate() + 1);
    } else {
      nextSwitch.setHours(20, 0, 0, 0);
      if (nextSwitch <= now) nextSwitch.setDate(nextSwitch.getDate() + 1);
    }
    overrideTheme = next;
    overrideUntil = nextSwitch.getTime();
    localStorage.setItem('themeOverride',      overrideTheme);
    localStorage.setItem('themeOverrideUntil', String(overrideUntil));
    appliquerTheme(next, true);
  });

  appliquerTheme(themeActuel(), false);
  setInterval(verifierThemeAuto, 60 * 1000);

  // ===== PLEIN ÉCRAN =====
  const btnFS = document.getElementById('btn-fullscreen');

  function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
  }

  function toggleFullscreen() {
    if (!isFullscreen()) {
      const el = document.documentElement;
      if (el.requestFullscreen)            el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
    } else {
      if (document.exitFullscreen)            document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      else if (document.mozCancelFullScreen)  document.mozCancelFullScreen();
    }
  }

  btnFS.addEventListener('click', toggleFullscreen);

  function onFullscreenChange() {
    setTimeout(() => {
      activerScrollEnCours();
      relancerSliderAVenir();
    }, 250);
  }

  document.addEventListener('fullscreenchange',       onFullscreenChange);
  document.addEventListener('webkitfullscreenchange', onFullscreenChange);
  document.addEventListener('mozfullscreenchange',    onFullscreenChange);
  let resizeDebounce = null;
  window.addEventListener('resize', () => {
    // 1) Stopper immédiatement le scroll en cours
    const prev = scrollStates['list-en-cours'];
    if (prev) { clearTimeout(prev.timer); delete scrollStates['list-en-cours']; }

    // 2) Bloquer toute transition et forcer position 0 sans animation
    const inner = document.getElementById('inner-en-cours');
    if (inner) {
      inner.classList.add('no-transition');
      inner.style.transform = 'translateY(0)';
    }

    // 3) Debounce : on attend la fin du redimensionnement
    clearTimeout(resizeDebounce);
    resizeDebounce = setTimeout(() => {
      calibrer(donneesEnCours.length, donneesAVenir.length);
      // Attendre que le DOM ait appliqué les nouvelles tailles CSS
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (inner) inner.classList.remove('no-transition');
          activerScrollEnCours();
          // Pas besoin de relancer le slider (il est indépendant de la hauteur)
        });
      });
    }, 300);
  });

  // ===== CALIBRAGE ADAPTATIF =====
  function clampVal(val, min, max) {
    return Math.max(min, Math.min(max, Math.round(val)));
  }

  function calibrer(nbEC, nbAV) {
    const root = document.documentElement;
    const vw   = window.innerWidth;
    const vh   = window.innerHeight;

    root.style.setProperty('--clock-size',      clampVal(vw*0.09,  26, 80) + 'px');
    root.style.setProperty('--date-size',        clampVal(vw*0.022, 10, 20) + 'px');
    root.style.setProperty('--label-size',       clampVal(vw*0.020, 9,  18) + 'px');
    root.style.setProperty('--count-size',       clampVal(vw*0.017, 8,  15) + 'px');
    root.style.setProperty('--pill-val-size',    clampVal(vw*0.050, 14, 40) + 'px');
    root.style.setProperty('--pill-label-size',  clampVal(vw*0.017, 8,  14) + 'px');
    root.style.setProperty('--pill-sub-size',    clampVal(vw*0.017, 8,  14) + 'px');
    root.style.setProperty('--app-padding',      clampVal(vw*0.018, 7,  20) + 'px');
    root.style.setProperty('--section-gap',      clampVal(vh*0.008, 4,  14) + 'px');

    // Taille des cartes en-cours : adaptatif selon le nombre
    const total = Math.max(1, nbEC);
    const espaceDispo = vh * 0.50; // env 50% pour la zone en-cours

    const niveaux = [
      { lieu: Math.round(vw*0.042), meta: Math.round(vw*0.030), gap: Math.round(vh*0.010), padV: Math.round(vh*0.013) },
      { lieu: Math.round(vw*0.037), meta: Math.round(vw*0.026), gap: Math.round(vh*0.009), padV: Math.round(vh*0.012) },
      { lieu: Math.round(vw*0.032), meta: Math.round(vw*0.023), gap: Math.round(vh*0.008), padV: Math.round(vh*0.011) },
      { lieu: Math.round(vw*0.028), meta: Math.round(vw*0.020), gap: Math.round(vh*0.007), padV: Math.round(vh*0.010) },
      { lieu: Math.round(vw*0.024), meta: Math.round(vw*0.017), gap: Math.round(vh*0.006), padV: Math.round(vh*0.009) },
      { lieu: Math.round(vw*0.021), meta: Math.round(vw*0.015), gap: Math.round(vh*0.005), padV: Math.round(vh*0.008) },
      { lieu: Math.round(vw*0.018), meta: Math.round(vw*0.013), gap: Math.round(vh*0.004), padV: Math.round(vh*0.007) },
    ];
    const minLieu = 13, minMeta = 10;

    let lieuPx = minLieu, metaPx = minMeta, gapPx = 4, paddingV = 5;

    for (const n of niveaux) {
      const hCarte = n.lieu * 1.5 + n.meta * 2.5 + n.padV * 2 + 6 + n.gap;
      if (hCarte * total <= espaceDispo) {
        lieuPx = n.lieu; metaPx = n.meta;
        gapPx = n.gap; paddingV = n.padV;
        break;
      }
    }

    root.style.setProperty('--lieu-size',      Math.max(lieuPx, minLieu) + 'px');
    root.style.setProperty('--meta-size',       Math.max(metaPx, minMeta) + 'px');
    root.style.setProperty('--badge-size',      Math.max(Math.round(metaPx * 0.85), 9) + 'px');
    root.style.setProperty('--card-gap',        gapPx + 'px');
    root.style.setProperty('--card-padding-v',  paddingV + 'px');
  }

  // ===== ARRÊTÉS =====
  let donneesEnCours = [];
  let donneesAVenir  = [];

  async function chargerArretes() {
    try {
      const res     = await fetch(APPS_SCRIPT_URL);
      const donnees = await res.json();

      function parseDate(str) {
        if (!str || str === 'N/A') return new Date(2099,0,1);
        if (str.includes('/')) {
          const [d, m, y] = str.split('/');
          return new Date(+y, +m - 1, +d);
        }
        return new Date(str);
      }

      donneesEnCours = donnees
        .filter(a => a['Statut'] === "En cours")
        .sort((a, b) => parseDate(a['Date Fin']) - parseDate(b['Date Fin']));

      donneesAVenir = donnees
        .filter(a => a['Statut'] === "À venir")
        .sort((a, b) => parseDate(a['Date Début']) - parseDate(b['Date Début']));

      document.getElementById('count-en-cours').textContent = donneesEnCours.length;
      document.getElementById('count-a-venir').textContent  = donneesAVenir.length;

      // Cartes EN COURS
      const innerEC = document.getElementById('inner-en-cours');
      if (innerEC) {
        if (donneesEnCours.length === 0) {
          innerEC.innerHTML = '<div class="empty-msg">Aucun arrêté en cours</div>';
        } else {
          innerEC.innerHTML = donneesEnCours.map(a => `
            <div class="arrete-card en-cours">
              <div class="arrete-top">
                <span class="badge-statut red">EN COURS</span>
                <div class="arrete-lieu">📍 ${a['Lieu']}</div>
              </div>
              <div class="arrete-dates">
                📅 ${a['Date Début']} <span class="date-sep">→</span> ${a['Date Fin']}
              </div>
              <div class="arrete-motif">${a['Motif']}</div>
            </div>
          `).join('');
        }
      }

      // Calibrage puis scroll en-cours puis slider à-venir
      calibrer(donneesEnCours.length, donneesAVenir.length);
      setTimeout(() => {
        activerScrollEnCours();
        construireSliderAVenir();
      }, 150);

    } catch (err) {
      console.error("Erreur chargement arrêtés :", err);
      document.getElementById('inner-en-cours').innerHTML = '<div class="empty-msg">Erreur de connexion</div>';
      document.getElementById('slider-track').innerHTML    = '<div class="slider-card"><div class="arrete-top"><span class="badge-statut amber">À VENIR</span><div class="arrete-lieu">Erreur de connexion</div></div></div>';
    }
  }

  // ===== SCROLL PAGE PAR PAGE — EN COURS =====
  const scrollStates = {};

  function activerScrollEnCours() {
    const groupId    = 'list-en-cours';
    const innerId    = 'inner-en-cours';
    const dotsId     = 'dots-en-cours';
    const progFillId = 'prog-fill-en-cours';
    const progBarId  = 'prog-en-cours';

    const group    = document.getElementById(groupId);
    const inner    = document.getElementById(innerId);
    const dotsEl   = document.getElementById(dotsId);
    const progFill = document.getElementById(progFillId);
    const progBar  = document.getElementById(progBarId);
    if (!group || !inner) return;

    const prev = scrollStates[groupId];
    if (prev) { clearTimeout(prev.timer); delete scrollStates[groupId]; }

    inner.style.transform = 'translateY(0)';
    inner.classList.remove('no-transition');
    dotsEl.innerHTML = '';
    dotsEl.classList.remove('visible');
    progBar.classList.remove('visible');
    progFill.style.width = '0%';

    // Double rAF : garantit que le navigateur a recalculé les dimensions après le reset
    requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const groupH = group.clientHeight;
      const innerH = inner.scrollHeight;
      if (innerH <= groupH + 4) return;

      const cards   = inner.querySelectorAll('.arrete-card');
      if (!cards.length) return;

      const cardH   = cards[0].offsetHeight;
      const gapPx   = parseFloat(getComputedStyle(inner).gap) || 6;
      const unitH   = cardH + gapPx;
      const visibles = Math.max(1, Math.floor(groupH / unitH));
      const totalCards = cards.length;
      const positions = [];
      for (let i = 0; i < totalCards; i += visibles) {
        positions.push(Math.min(i * unitH, innerH - groupH));
      }
      const pages   = [...new Set(positions)];
      const nbPages = pages.length;
      if (nbPages <= 1) return;

      dotsEl.innerHTML = '';
      pages.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'scroll-dot' + (i === 0 ? ' active' : '');
        dotsEl.appendChild(d);
      });
      dotsEl.classList.add('visible');
      progBar.classList.add('visible');

      let currentPage = 0;

      function updateUI() {
        dotsEl.querySelectorAll('.scroll-dot').forEach((d, i) => d.classList.toggle('active', i === currentPage));
        progFill.style.width = (nbPages <= 1 ? 100 : (currentPage / (nbPages - 1)) * 100) + '%';
      }

      function scrollToPage(pageIdx, onDone) {
        const targetY = pages[pageIdx];
        inner.classList.remove('no-transition');
        inner.style.transform = `translateY(${-targetY}px)`;
        let fired = false;
        const onEnd = () => {
          if (fired) return; fired = true;
          inner.removeEventListener('transitionend', onEnd);
          if (onDone) onDone();
        };
        inner.addEventListener('transitionend', onEnd);
        // Fallback si transitionend ne se déclenche pas (ex: même position)
        setTimeout(onEnd, 800);
      }

      const tempsLecture  = Math.max(6000, visibles * 1100);
      const tempsPauseBas = 3000;

      function cycle() {
        if (!scrollStates[groupId]) return;
        if (currentPage < nbPages - 1) {
          currentPage++;
          updateUI();
          scrollToPage(currentPage, () => {
            scrollStates[groupId].timer = setTimeout(cycle, tempsLecture);
          });
        } else {
          scrollStates[groupId].timer = setTimeout(() => {
            if (!scrollStates[groupId]) return;
            currentPage = 0;
            updateUI();
            scrollToPage(0, () => {
              scrollStates[groupId].timer = setTimeout(cycle, tempsLecture);
            });
          }, tempsPauseBas);
        }
      }

      scrollStates[groupId] = {};
      updateUI();
      scrollStates[groupId].timer = setTimeout(cycle, tempsLecture);
    }); // fin rAF intérieur
    }); // fin rAF extérieur
  }

  // ===== SLIDER À VENIR =====
  let sliderTimer    = null;
  let sliderTicker   = null;
  let sliderCurrent  = 0;
  let sliderTotal    = 0;
  const SLIDER_DUREE = 12000; // 12 secondes par slide

  function construireSliderAVenir() {
    // Nettoyage
    if (sliderTimer)  { clearTimeout(sliderTimer);  sliderTimer  = null; }
    if (sliderTicker) { clearInterval(sliderTicker); sliderTicker = null; }

    const track      = document.getElementById('slider-track');
    const viewport   = document.getElementById('slider-viewport');
    const indicators = document.getElementById('slider-indicators');
    const progFill   = document.getElementById('slider-progress-fill');

    if (!track || !viewport) return;

    // HTML des cartes
    if (donneesAVenir.length === 0) {
      track.innerHTML = `
        <div class="slider-card">
          <div class="arrete-top">
            <span class="badge-statut amber">À VENIR</span>
            <div class="arrete-lieu">Aucun arrêté à venir</div>
          </div>
        </div>`;
      indicators.innerHTML = '';
      progFill.style.width = '0%';
      return;
    }

    track.innerHTML = donneesAVenir.map(a => `
      <div class="slider-card">
        <div class="arrete-top">
          <span class="badge-statut amber">À VENIR</span>
          <div class="arrete-lieu">📍 ${a['Lieu']}</div>
        </div>
        <div class="arrete-dates">
          📅 ${a['Date Début']} <span class="date-sep">→</span> ${a['Date Fin']}
        </div>
        <div class="arrete-motif">${a['Motif']}</div>
      </div>
    `).join('');

    sliderTotal   = donneesAVenir.length;
    sliderCurrent = 0;

    // Indicateurs
    indicators.innerHTML = '';
    for (let i = 0; i < sliderTotal; i++) {
      const pip = document.createElement('div');
      pip.className = 'slider-pip' + (i === 0 ? ' active' : '');
      indicators.appendChild(pip);
    }

    // Largeur du track
    track.style.width = (sliderTotal * 100) + '%';
    track.querySelectorAll('.slider-card').forEach(c => c.style.width = (100 / sliderTotal) + '%');

    // Aller à slide 0 sans anim
    track.classList.add('no-anim');
    track.style.transform = 'translateX(0)';
    requestAnimationFrame(() => track.classList.remove('no-anim'));

    if (sliderTotal === 1) {
      progFill.style.width = '100%';
      return;
    }

    lancerSlider();
  }

  function lancerSlider() {
    if (sliderTimer)  { clearTimeout(sliderTimer);  sliderTimer  = null; }
    if (sliderTicker) { clearInterval(sliderTicker); sliderTicker = null; }

    const track      = document.getElementById('slider-track');
    const indicators = document.getElementById('slider-indicators');
    const progFill   = document.getElementById('slider-progress-fill');
    if (!track) return;

    let elapsed = 0;
    const tickMs = 50;

    // Barre de progression en temps réel
    sliderTicker = setInterval(() => {
      elapsed += tickMs;
      const pct = Math.min(100, (elapsed / SLIDER_DUREE) * 100);
      progFill.style.width = pct + '%';
    }, tickMs);

    sliderTimer = setTimeout(() => {
      clearInterval(sliderTicker);
      sliderTicker = null;

      sliderCurrent = (sliderCurrent + 1) % sliderTotal;
      allerASlide(sliderCurrent);
      lancerSlider();
    }, SLIDER_DUREE);
  }

  function allerASlide(idx) {
    const track      = document.getElementById('slider-track');
    const indicators = document.getElementById('slider-indicators');
    const progFill   = document.getElementById('slider-progress-fill');
    if (!track) return;

    const pct = (100 / sliderTotal) * idx;
    track.classList.remove('no-anim');
    track.style.transform = `translateX(-${pct}%)`;

    // Mise à jour indicateurs
    indicators.querySelectorAll('.slider-pip').forEach((p, i) => p.classList.toggle('active', i === idx));
    progFill.style.width = '0%';
  }

  function relancerSliderAVenir() {
    if (sliderTotal > 1) {
      if (sliderTimer)  { clearTimeout(sliderTimer);  sliderTimer  = null; }
      if (sliderTicker) { clearInterval(sliderTicker); sliderTicker = null; }
      lancerSlider();
    }
  }

  // ===== MÉTÉO =====
  const WMO_ICONS = {
    0:'☀️',1:'🌤',2:'⛅',3:'☁️',
    45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',
    61:'🌧',63:'🌧',65:'🌧',71:'❄️',73:'❄️',75:'❄️',
    80:'🌦',81:'🌧',82:'⛈',95:'⛈',96:'⛈',99:'⛈'
  };
  const WMO_LABELS = {
    0:'Ensoleillé',1:'Peu nuageux',2:'Partiellement nuageux',3:'Couvert',
    45:'Brouillard',48:'Brouillard givrant',51:'Bruine légère',53:'Bruine',55:'Bruine forte',
    61:'Pluie légère',63:'Pluie',65:'Pluie forte',71:'Neige légère',73:'Neige',75:'Neige forte',
    80:'Averses légères',81:'Averses',82:'Averses fortes',95:'Orage',96:'Orage avec grêle',99:'Orage violent'
  };

  async function chargerMeteo() {
    try {
      const res  = await fetch("https://api.open-meteo.com/v1/forecast?latitude=45.5228&longitude=4.8742&current=temperature_2m,weathercode&timezone=Europe%2FParis");
      const data = await res.json();
      const temp = Math.round(data.current.temperature_2m * 10) / 10;
      const code = data.current.weathercode;
      document.getElementById('m-temp').innerHTML = `${temp}<span class="unit">°C</span>`;
      document.getElementById('m-icon').textContent = WMO_ICONS[code] || '🌤';
      document.getElementById('m-cond').textContent = WMO_LABELS[code] || '—';
    } catch(e) {
      document.getElementById('m-cond').textContent = '⚠ Indisponible';
    }
  }

  // ===== DÉBIT RHÔNE =====
  const STATIONS = ["V303002002","V303002001"];
  async function chargerDebit(idx = 0) {
    if (idx >= STATIONS.length) {
      document.getElementById('rhone-debit').innerHTML = '—<span class="unit"> m³/s</span>';
      return;
    }
    try {
      const res  = await fetch(`https://hubeau.eaufrance.fr/api/v2/hydrometrie/observations_tr?code_entite=${STATIONS[idx]}&grandeur_hydro=Q&size=1&sort=desc&fields=date_obs,resultat_obs`);
      const data = await res.json();
      if (data?.data?.length > 0) {
        const last     = data.data[0];
        const m3s      = (last.resultat_obs / 1000).toFixed(0);
        const obsDate  = new Date(last.date_obs);
        const dateStr  = obsDate.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'2-digit' });
        const heureStr = obsDate.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
        document.getElementById('rhone-debit').innerHTML = `${m3s}<span class="unit"> m³/s</span>`;
        document.getElementById('rhone-heure').textContent = `Relevé le ${dateStr} à ${heureStr}`;
        document.getElementById('rhone-station').textContent = `#${STATIONS[idx]}`;
        const QMAX = 4780, QMOD = 1060;
        const debit = parseInt(m3s);
        const pct   = Math.min(100, Math.max(1, (debit / QMAX) * 100));
        const fillColor = debit <= QMOD ? 'var(--accent)' : pct < 50 ? 'var(--amber)' : 'var(--red)';
        const fillEl = document.getElementById('rhone-level-fill');
        fillEl.style.height = pct.toFixed(1) + '%';
        fillEl.style.background = fillColor;
        document.getElementById('rhone-level-pct').textContent = Math.round(pct) + '%';
        document.getElementById('rhone-level-pct').style.color = fillColor;
      } else { chargerDebit(idx+1); }
    } catch(e) { chargerDebit(idx+1); }
  }

  // ===== REFRESH AUTO =====
  setInterval(() => {
    const now = new Date();
    if ((now.getHours() === 7 || now.getHours() === 19) && now.getMinutes() === 1) location.reload();
  }, 60 * 1000);

  // ===== INIT =====
  calibrer(0, 0);
  chargerArretes();
  chargerMeteo();
  chargerDebit();
  setInterval(chargerArretes, 5  * 60 * 1000);
  setInterval(chargerMeteo,   30 * 60 * 1000);
  setInterval(chargerDebit,   10 * 60 * 1000);
</script>
</body>
