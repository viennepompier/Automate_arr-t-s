<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Vienne</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    /* ===== THÈMES ===== */
    :root[data-theme="dark"] {
      --bg: #0d0f12; --bg2: #13161a; --bg3: #1c2029; --border: #252b35;
      --text: #eef1f6; --muted: #5a6272; --muted2: #2e3445;
      --red: #ff4444; --red-bg: rgba(255,68,68,0.08); --red-border: rgba(255,68,68,0.22);
      --amber: #ffaa00; --amber-bg: rgba(255,170,0,0.08); --amber-border: rgba(255,170,0,0.22);
      --accent: #3b9eff; --accent-bg: rgba(59,158,255,0.10);
      --blue: #3b9eff;
      --grad-fade: linear-gradient(transparent, #0d0f12);
      --header-bg: rgba(13,15,18,0.95);
      --shadow: 0 2px 12px rgba(0,0,0,0.35);
    }
    :root[data-theme="light"] {
      --bg: #eef1f5; --bg2: #ffffff; --bg3: #e2e6ed; --border: #cdd2db;
      --text: #0d1117; --muted: #7a879c; --muted2: #c4cad5;
      --red: #d42020; --red-bg: rgba(212,32,32,0.06); --red-border: rgba(212,32,32,0.2);
      --amber: #c47d00; --amber-bg: rgba(196,125,0,0.06); --amber-border: rgba(196,125,0,0.2);
      --accent: #1a7fe0; --accent-bg: rgba(26,127,224,0.07);
      --blue: #1a7fe0;
      --grad-fade: linear-gradient(transparent, #eef1f5);
      --header-bg: rgba(238,241,245,0.96);
      --shadow: 0 2px 10px rgba(0,0,0,0.08);
    }

    /* ===== TRANSITIONS THÈME ===== */
    *, *::before, *::after {
      transition:
        background-color 0.9s ease,
        color 0.7s ease,
        border-color 0.7s ease,
        box-shadow 0.7s ease !important;
    }
    .loader-bar            { transition: width 0.3s linear !important; }
    .scroll-progress-fill  { transition: width 0.12s linear !important; }
    .scroll-dot            { transition: background-color 0.3s ease, transform 0.3s ease !important; }
    .arretes-inner         { transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1) !important; }
    .arretes-inner.no-transition { transition: none !important; }

    /* ===== BASE ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
    }

    /* ===== VARIABLES DYNAMIQUES ===== */
    :root {
      --lieu-size:        clamp(14px, 2.6vw, 30px);
      --meta-size:        clamp(11px, 1.8vw, 20px);
      --pill-size:        clamp(9px,  1.4vw, 16px);
      --clock-size:       clamp(32px, 7vw,   80px);
      --date-size:        clamp(10px, 1.5vw, 18px);
      --label-size:       clamp(9px,  1.5vw, 16px);
      --count-size:       clamp(9px,  1.3vw, 15px);
      --pill-val-size:    clamp(16px, 3.2vw, 38px);
      --pill-label-size:  clamp(8px,  1.2vw, 13px);
      --pill-sub-size:    clamp(8px,  1.2vw, 13px);
      --card-padding-v:   clamp(10px, 1.2vh, 18px);
      --card-gap:         clamp(6px,  0.8vh, 12px);
      --section-gap:      clamp(5px,  0.7vh, 12px);
      --app-padding:      clamp(8px,  1.2vw, 18px);
      --badge-size:       clamp(9px,  1.3vw, 15px);
    }

    /* ===== LOADER ===== */
    .loader-bar {
      position: fixed; top: 0; left: 0;
      height: 3px; width: 0%;
      background: var(--accent);
      z-index: 300;
    }

    /* ===== LAYOUT ===== */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: var(--app-padding);
      gap: var(--section-gap);
    }

    /* ===== HORLOGE ===== */
    .clock-section {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: var(--section-gap);
      border-bottom: 2px solid var(--border);
      gap: 8px;
    }

    .clock-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: var(--clock-size);
      line-height: 1;
      letter-spacing: 0.05em;
      color: var(--text);
      flex-shrink: 0;
    }

    .clock-date {
      font-size: var(--date-size);
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      flex: 1;
      text-align: center;
      padding: 0 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-btns {
      display: flex;
      gap: clamp(4px, 0.6vw, 8px);
      flex-shrink: 0;
    }

    .icon-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: clamp(3px, 0.5vh, 6px) clamp(8px, 1.1vw, 14px);
      font-size: clamp(12px, 1.9vw, 22px);
      cursor: pointer;
      line-height: 1.4;
      color: var(--text);
    }
    .icon-btn:hover  { background: var(--border); }
    .icon-btn:active { transform: scale(0.95); }

    /* ===== SECTION ARRÊTÉS ===== */
    .arretes-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: var(--card-gap);
    }

    /* ===== HEADER DE SECTION ===== */
    .section-header {
      display: flex;
      align-items: center;
      gap: clamp(5px, 0.8vw, 10px);
      flex-shrink: 0;
      padding: clamp(4px,0.5vh,7px) clamp(6px,0.8vw,10px);
      border-radius: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
    }

    .section-header.en-cours-header { border-left: 4px solid var(--red); }
    .section-header.a-venir-header  { border-left: 4px solid var(--amber); }

    .dot {
      width: clamp(7px, 1.1vw, 11px);
      height: clamp(7px, 1.1vw, 11px);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.red   { background: var(--red);   box-shadow: 0 0 7px var(--red);   animation: pulse 2s infinite; }
    .dot.amber { background: var(--amber); box-shadow: 0 0 5px var(--amber); }

    .section-header .label {
      font-size: var(--label-size);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
    }

    .section-header .count {
      margin-left: auto;
      font-size: var(--count-size);
      font-weight: 700;
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 2px clamp(7px, 1vw, 12px);
      border-radius: 20px;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* Dots de pagination */
    .scroll-dots {
      display: none;
      gap: 4px;
      margin-left: 6px;
      align-items: center;
    }
    .scroll-dots.visible { display: flex; }
    .scroll-dot {
      width: clamp(5px, 0.7vw, 8px);
      height: clamp(5px, 0.7vw, 8px);
      border-radius: 50%;
      background: var(--border);
    }
    .scroll-dot.active {
      background: var(--accent);
      transform: scale(1.3);
    }

    /* Barre de progression */
    .scroll-progress-bar {
      height: 3px;
      background: var(--muted2);
      border-radius: 3px;
      flex-shrink: 0;
      overflow: hidden;
      opacity: 0;
    }
    .scroll-progress-bar.visible { opacity: 1; }
    .scroll-progress-fill {
      height: 100%;
      border-radius: 3px;
      width: 0%;
    }
    .fill-red   { background: var(--red); }
    .fill-amber { background: var(--amber); }

    /* ===== GROUPE CARTES — hauteur égale pour en-cours et à-venir ===== */
    .arretes-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    /* Pas de dégradé de fondu — supprimé pour meilleure lisibilité */

    .arretes-inner {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: var(--card-gap);
    }
    .arretes-inner.no-transition { transition: none; }

    /* ===== CARTE ARRÊTÉ — REDESIGN 2.0 ===== */
    .arrete-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: clamp(10px, 1.4vh, 18px) clamp(10px, 1.4vw, 18px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: clamp(5px, 0.7vh, 9px);
    }

    .arrete-card.en-cours {
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-left: 4px solid var(--red);
    }
    .arrete-card.a-venir {
      background: var(--amber-bg);
      border: 1px solid var(--amber-border);
      border-left: 4px solid var(--amber);
    }

    /* Ligne 1 : badge + lieu */
    .arrete-top {
      display: flex;
      align-items: flex-start;
      gap: clamp(6px, 0.8vw, 10px);
      flex-wrap: wrap;
    }

    /* Badge de statut — grande étiquette visible */
    .badge-statut {
      display: inline-flex;
      align-items: center;
      font-size: var(--badge-size);
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: clamp(2px,0.3vh,4px) clamp(7px,0.9vw,11px);
      border-radius: 6px;
      flex-shrink: 0;
      line-height: 1.5;
    }
    .badge-statut.red {
      background: var(--red);
      color: #fff;
    }
    .badge-statut.amber {
      background: var(--amber);
      color: #fff;
    }

    /* Lieu */
    .arrete-lieu {
      font-weight: 700;
      font-size: var(--lieu-size);
      color: var(--text);
      line-height: 1.25;
      flex: 1;
      /* Pas de nowrap ni ellipsis → texte entier visible */
      word-break: break-word;
    }

    /* Ligne 2 : dates */
    .arrete-dates {
      font-size: var(--meta-size);
      color: var(--muted);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      line-height: 1.4;
    }

    .date-sep {
      opacity: 0.5;
    }

    /* Ligne 3 : motif */
    .arrete-motif {
      font-size: var(--meta-size);
      color: var(--text);
      font-weight: 400;
      line-height: 1.45;
      /* Texte entier, pas d'ellipsis */
      word-break: break-word;
      opacity: 0.85;
    }

    .empty-msg {
      font-size: var(--meta-size);
      color: var(--muted2);
      font-style: italic;
      padding: clamp(6px, 0.8vh, 10px) 0;
    }

    .divider {
      height: 1px;
      background: var(--border);
      flex-shrink: 0;
      margin: clamp(1px, 0.2vh, 3px) 0;
    }

    /* ===== BARRE INFÉRIEURE ===== */
    .info-bar {
      flex-shrink: 0;
      display: flex;
      gap: clamp(5px, 0.8vw, 12px);
    }

    .info-pill {
      flex: 1;
      min-width: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: clamp(8px, 1.2vw, 14px);
      padding: clamp(6px, 1vh, 12px) clamp(8px, 1.3vw, 16px);
      display: flex;
      align-items: center;
      gap: clamp(6px, 0.9vw, 12px);
      box-shadow: var(--shadow);
    }

    .pill-icon {
      font-size: clamp(18px, 3vw, 32px);
      flex-shrink: 0;
      line-height: 1;
    }

    .pill-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .pill-label {
      font-size: var(--pill-label-size);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .pill-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: var(--pill-val-size);
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pill-value.blue   { color: var(--blue); }
    .pill-value.accent { color: var(--accent); }

    .pill-value .unit {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(9px, 1.3vw, 15px);
      font-weight: 400;
      color: var(--muted);
    }

    .pill-sub {
      font-size: var(--pill-sub-size);
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill-badge {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: clamp(2px, 0.3vh, 5px);
    }

    /* Barre de niveau Rhône */
    .rhone-level-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(2px, 0.3vh, 4px);
      flex-shrink: 0;
      height: 100%;
      justify-content: center;
    }

    .rhone-level-bar {
      width: clamp(7px, 1.1vw, 12px);
      height: clamp(38px, 6.5vh, 76px);
      background: var(--bg3);
      border-radius: 99px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--border);
    }

    .rhone-level-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      border-radius: 99px;
      transition: height 1.2s cubic-bezier(0.4, 0, 0.2, 1),
                  background-color 0.9s ease;
    }

    .rhone-level-bar::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      bottom: 22%;
      height: 1px;
      background: var(--border);
      opacity: 0.7;
    }

    .rhone-level-pct {
      font-size: clamp(7px, 1vw, 11px);
      font-weight: 700;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
    }

    /* ===== FULLSCREEN ===== */
    #btn-fullscreen::before { content: '⛶'; }

    /* ===== ANIMATIONS ===== */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  </style>
</head>
<body>

<div class="loader-bar" id="loader-bar"></div>

<div class="app">

  <!-- HORLOGE -->
  <div class="clock-section">
    <div class="clock-time" id="clock-time">00:00:00</div>
    <div class="clock-date" id="clock-date">—</div>
    <div class="header-btns">
      <button class="icon-btn" id="btn-theme" title="Thème">🌙</button>
      <button class="icon-btn" id="btn-fullscreen" title="Plein écran"></button>
    </div>
  </div>

  <!-- ARRÊTÉS -->
  <div class="arretes-section" id="arretes-section">

    <div class="section-header en-cours-header">
      <div class="dot red"></div>
      <span class="label">En cours</span>
      <div class="scroll-dots" id="dots-en-cours"></div>
      <span class="count" id="count-en-cours">—</span>
    </div>
    <div class="scroll-progress-bar" id="prog-en-cours">
      <div class="scroll-progress-fill fill-red" id="prog-fill-en-cours"></div>
    </div>
    <div class="arretes-group" id="list-en-cours">
      <div class="arretes-inner" id="inner-en-cours">
        <div class="empty-msg">Chargement…</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-header a-venir-header">
      <div class="dot amber"></div>
      <span class="label">À venir</span>
      <div class="scroll-dots" id="dots-a-venir"></div>
      <span class="count" id="count-a-venir">—</span>
    </div>
    <div class="scroll-progress-bar" id="prog-a-venir">
      <div class="scroll-progress-fill fill-amber" id="prog-fill-a-venir"></div>
    </div>
    <div class="arretes-group" id="list-a-venir">
      <div class="arretes-inner" id="inner-a-venir">
        <div class="empty-msg">Chargement…</div>
      </div>
    </div>

  </div>

  <!-- BARRE INFÉRIEURE : Rhône + Météo -->
  <div class="info-bar">

    <!-- PILL RHÔNE -->
    <div class="info-pill">
      <div class="pill-icon">🌊</div>
      <div class="pill-body">
        <div class="pill-label">Rhône · Ternay</div>
        <div class="pill-value blue" id="rhone-debit">—<span class="unit"> m³/s</span></div>
      </div>
      <div class="rhone-level-wrap">
        <div class="rhone-level-bar">
          <div class="rhone-level-fill" id="rhone-level-fill" style="height:0%;background:var(--muted2)"></div>
        </div>
        <div class="rhone-level-pct" id="rhone-level-pct">—</div>
      </div>
    </div>

    <!-- PILL MÉTÉO -->
    <div class="info-pill">
      <div class="pill-icon" id="m-icon">⛅</div>
      <div class="pill-body">
        <div class="pill-label">Météo · Vienne</div>
        <div class="pill-value accent" id="m-temp">—<span class="unit">°C</span></div>
        <div class="pill-sub" id="m-cond">Chargement…</div>
      </div>
    </div>

  </div>

</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxo4Y50C5QbthOZy1rRC7pT9FPMRIhtJOCOjFmqp3rBEK6Tv4Md8fT629Nki4WPY7REWw/exec";

  // ===== HORLOGE =====
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;
    document.getElementById('clock-date').textContent = now.toLocaleDateString('fr-FR',{
      weekday:'long', day:'numeric', month:'long'
    });
    if (h==='07' && m==='01' && s==='00') chargerArretes();
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ===== THÈME — auto 20h→7h, override manuel =====
  const htmlEl   = document.documentElement;
  const btnTheme = document.getElementById('btn-theme');

  function estNuit() {
    const h = new Date().getHours();
    return h >= 20 || h < 7;
  }

  function appliquerTheme(theme, withTransition) {
    if (!withTransition) {
      document.body.style.transition = 'none';
      htmlEl.querySelectorAll('*').forEach(el => el.style.transition = 'none');
    }
    htmlEl.setAttribute('data-theme', theme);
    btnTheme.textContent = theme === 'dark' ? '☀️' : '🌙';
    btnTheme.title = theme === 'dark' ? 'Passer en clair' : 'Passer en sombre';
    if (!withTransition) {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.body.style.transition = '';
          htmlEl.querySelectorAll('*').forEach(el => el.style.transition = '');
        });
      });
    }
  }

  let overrideTheme = localStorage.getItem('themeOverride') || null;
  let overrideUntil = parseInt(localStorage.getItem('themeOverrideUntil') || '0');

  function themeActuel() {
    const now = Date.now();
    if (overrideTheme && now < overrideUntil) return overrideTheme;
    return estNuit() ? 'dark' : 'light';
  }

  function verifierThemeAuto() {
    const attendu = estNuit() ? 'dark' : 'light';
    const actuel  = htmlEl.getAttribute('data-theme');
    if (actuel !== attendu) {
      const now = Date.now();
      if (!overrideTheme || now >= overrideUntil) {
        overrideTheme = null;
        overrideUntil = 0;
        localStorage.removeItem('themeOverride');
        localStorage.removeItem('themeOverrideUntil');
        appliquerTheme(attendu, true);
      }
    }
  }

  btnTheme.addEventListener('click', () => {
    const actuel = htmlEl.getAttribute('data-theme');
    const next   = actuel === 'dark' ? 'light' : 'dark';
    const now = new Date();
    const nextSwitch = new Date();
    if (next === 'dark') {
      nextSwitch.setHours(7, 0, 0, 0);
      if (nextSwitch <= now) nextSwitch.setDate(nextSwitch.getDate() + 1);
    } else {
      nextSwitch.setHours(20, 0, 0, 0);
      if (nextSwitch <= now) nextSwitch.setDate(nextSwitch.getDate() + 1);
    }
    overrideTheme = next;
    overrideUntil = nextSwitch.getTime();
    localStorage.setItem('themeOverride',      overrideTheme);
    localStorage.setItem('themeOverrideUntil', String(overrideUntil));
    appliquerTheme(next, true);
  });

  appliquerTheme(themeActuel(), false);
  setInterval(verifierThemeAuto, 60 * 1000);

  // ===== MODE PLEIN ÉCRAN =====
  const btnFS = document.getElementById('btn-fullscreen');

  function recalibrerEtScroll() {
    const ec = parseInt(document.getElementById('count-en-cours').textContent) || 0;
    const av = parseInt(document.getElementById('count-a-venir').textContent)  || 0;
    calibrer(ec, av);
    setTimeout(() => {
      activerScroll('list-en-cours', 'inner-en-cours', 'dots-en-cours', 'prog-fill-en-cours', 'prog-en-cours');
      activerScroll('list-a-venir',  'inner-a-venir',  'dots-a-venir',  'prog-fill-a-venir',  'prog-a-venir');
    }, 150);
  }

  function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
  }

  function toggleFullscreen() {
    if (!isFullscreen()) {
      const el = document.documentElement;
      if (el.requestFullscreen)            el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
    } else {
      if (document.exitFullscreen)            document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      else if (document.mozCancelFullScreen)  document.mozCancelFullScreen();
    }
  }

  btnFS.addEventListener('click', toggleFullscreen);

  function onFullscreenChange() {
    setTimeout(recalibrerEtScroll, 200);
  }

  document.addEventListener('fullscreenchange',       onFullscreenChange);
  document.addEventListener('webkitfullscreenchange', onFullscreenChange);
  document.addEventListener('mozfullscreenchange',    onFullscreenChange);

  // ===== CALIBRAGE ADAPTATIF =====
  function calibrer(nbEC, nbAV) {
    const root  = document.documentElement;
    const total = nbEC + nbAV;
    const vw    = window.innerWidth;
    const vh    = window.innerHeight;

    const groupEC = document.getElementById('list-en-cours');
    const groupAV = document.getElementById('list-a-venir');
    // Sections toujours à taille égale, quelle que soit la quantité de cartes
    groupEC.style.flex = '1';
    groupAV.style.flex = '1';

    const espaceDispo = vh * 0.68;

    function estimerHauteurCarte(lieuPx, metaPx, paddingV, gap) {
      // 2.0 : les cartes sont plus hautes (3 lignes de texte)
      return lieuPx * 1.5 + metaPx * 2.5 + paddingV * 2 + 6 + gap;
    }

    const headersFixes = vh * 0.09;

    const niveaux = [
      { lieu: Math.round(vw*0.042), meta: Math.round(vw*0.030), pill: Math.round(vw*0.024), gap: Math.round(vh*0.010), padV: Math.round(vh*0.013) },
      { lieu: Math.round(vw*0.037), meta: Math.round(vw*0.026), pill: Math.round(vw*0.021), gap: Math.round(vh*0.009), padV: Math.round(vh*0.012) },
      { lieu: Math.round(vw*0.032), meta: Math.round(vw*0.023), pill: Math.round(vw*0.018), gap: Math.round(vh*0.008), padV: Math.round(vh*0.011) },
      { lieu: Math.round(vw*0.028), meta: Math.round(vw*0.020), pill: Math.round(vw*0.016), gap: Math.round(vh*0.007), padV: Math.round(vh*0.010) },
      { lieu: Math.round(vw*0.024), meta: Math.round(vw*0.017), pill: Math.round(vw*0.014), gap: Math.round(vh*0.006), padV: Math.round(vh*0.009) },
      { lieu: Math.round(vw*0.021), meta: Math.round(vw*0.015), pill: Math.round(vw*0.012), gap: Math.round(vh*0.005), padV: Math.round(vh*0.008) },
      { lieu: Math.round(vw*0.018), meta: Math.round(vw*0.013), pill: Math.round(vw*0.011), gap: Math.round(vh*0.004), padV: Math.round(vh*0.007) },
      { lieu: Math.round(vw*0.015), meta: Math.round(vw*0.011), pill: Math.round(vw*0.009), gap: Math.round(vh*0.003), padV: Math.round(vh*0.006) },
    ];

    const minLieu = Math.max(13, Math.round(vw * 0.013));
    const minMeta = Math.max(10, Math.round(vw * 0.010));

    let lieuPx = minLieu, metaPx = minMeta, pillPx = minMeta, gapPx = 4, paddingV = 5;

    for (const n of niveaux) {
      const hCarte = estimerHauteurCarte(n.lieu, n.meta, n.padV, n.gap);
      const totalH = hCarte * total + headersFixes;
      if (totalH <= espaceDispo) {
        lieuPx = n.lieu; metaPx = n.meta; pillPx = n.pill;
        gapPx = n.gap; paddingV = n.padV;
        break;
      }
    }

    root.style.setProperty('--lieu-size',       Math.max(lieuPx, minLieu) + 'px');
    root.style.setProperty('--meta-size',        Math.max(metaPx, minMeta) + 'px');
    root.style.setProperty('--pill-size',        Math.max(pillPx, minMeta) + 'px');
    root.style.setProperty('--badge-size',       Math.max(Math.round(metaPx * 0.85), 9) + 'px');
    root.style.setProperty('--card-gap',         gapPx + 'px');
    root.style.setProperty('--card-padding-v',   paddingV + 'px');
    root.style.setProperty('--clock-size',       clampVal(vw*0.09,  26, 80) + 'px');
    root.style.setProperty('--date-size',        clampVal(vw*0.022, 10, 20) + 'px');
    root.style.setProperty('--label-size',       clampVal(vw*0.020, 9,  18) + 'px');
    root.style.setProperty('--count-size',       clampVal(vw*0.017, 8,  15) + 'px');
    root.style.setProperty('--pill-val-size',    clampVal(vw*0.050, 14, 40) + 'px');
    root.style.setProperty('--pill-label-size',  clampVal(vw*0.017, 8,  14) + 'px');
    root.style.setProperty('--pill-sub-size',    clampVal(vw*0.017, 8,  14) + 'px');
    root.style.setProperty('--app-padding',      clampVal(vw*0.018, 7,  20) + 'px');
    root.style.setProperty('--section-gap',      clampVal(vh*0.008, 4,  14) + 'px');
  }

  function clampVal(val, min, max) {
    return Math.max(min, Math.min(max, Math.round(val)));
  }

  window.addEventListener('resize', recalibrerEtScroll);

  // ===== ARRÊTÉS =====
  async function chargerArretes() {
    try {
      const res = await fetch(APPS_SCRIPT_URL);
      const donnees = await res.json();

      function parseDate(str) {
        if (!str || str === 'N/A') return new Date(2099,0,1);
        if (str.includes('/')) {
          const [d, m, y] = str.split('/');
          return new Date(+y, +m - 1, +d);
        }
        return new Date(str);
      }

      const enCours = donnees
        .filter(a => a['Statut'] === "En cours")
        .sort((a, b) => parseDate(a['Date Fin']) - parseDate(b['Date Fin']));

      const aVenir = donnees
        .filter(a => a['Statut'] === "À venir")
        .sort((a, b) => parseDate(a['Date Début']) - parseDate(b['Date Début']));

      document.getElementById('count-en-cours').textContent = enCours.length;
      document.getElementById('count-a-venir').textContent  = aVenir.length;

      // Génération HTML des cartes — texte entier visible, badge de statut proéminent
      const creerCartesHTML = (liste, cssClass, badgeClass, etiquette) => {
        if (liste.length === 0) return '<div class="empty-msg">Aucun arrêté</div>';
        return liste.map(arrete => `
          <div class="arrete-card ${cssClass}">
            <div class="arrete-top">
              <span class="badge-statut ${badgeClass}">${etiquette}</span>
              <div class="arrete-lieu">📍 ${arrete['Lieu']}</div>
            </div>
            <div class="arrete-dates">
              📅 ${arrete['Date Début']}
              <span class="date-sep">→</span>
              ${arrete['Date Fin']}
            </div>
            <div class="arrete-motif">${arrete['Motif']}</div>
          </div>
        `).join('');
      };

      const containerEnCours = document.getElementById('inner-en-cours');
      if (containerEnCours) containerEnCours.innerHTML = creerCartesHTML(enCours, 'en-cours', 'red', 'EN COURS');

      const containerAVenir = document.getElementById('inner-a-venir');
      if (containerAVenir) containerAVenir.innerHTML = creerCartesHTML(aVenir, 'a-venir', 'amber', 'À VENIR');

      if (typeof calibrer === "function") {
        setTimeout(() => {
          calibrer(enCours.length, aVenir.length);
          // Lance le scroll immédiatement après le calibrage, sans attendre un resize
          setTimeout(() => {
            activerScroll('list-en-cours', 'inner-en-cours', 'dots-en-cours', 'prog-fill-en-cours', 'prog-en-cours');
            activerScroll('list-a-venir',  'inner-a-venir',  'dots-a-venir',  'prog-fill-a-venir',  'prog-a-venir');
          }, 200);
        }, 100);
      }

    } catch (err) {
      console.error("Erreur de chargement des arrêtés :", err);
      document.getElementById('inner-en-cours').innerHTML = '<div class="empty-msg">Erreur de connexion</div>';
      document.getElementById('inner-a-venir').innerHTML  = '<div class="empty-msg">Erreur de connexion</div>';
    }
  }

  // ===== SCROLL PAGE PAR PAGE =====
  const scrollStates = {};

  function activerScroll(groupId, innerId, dotsId, progFillId, progBarId) {
    const group    = document.getElementById(groupId);
    const inner    = document.getElementById(innerId);
    const dotsEl   = document.getElementById(dotsId);
    const progFill = document.getElementById(progFillId);
    const progBar  = document.getElementById(progBarId);
    if (!group || !inner) return;

    const prev = scrollStates[groupId];
    if (prev) {
      clearTimeout(prev.timer);
      delete scrollStates[groupId];
    }

    inner.style.transform = 'translateY(0)';
    inner.classList.remove('no-transition');
    dotsEl.innerHTML = '';
    dotsEl.classList.remove('visible');
    progBar.classList.remove('visible');
    progFill.style.width = '0%';

    requestAnimationFrame(() => {
      const groupH = group.clientHeight;
      const innerH = inner.scrollHeight;

      if (innerH <= groupH + 4) {
        group.classList.remove('overflow');
        return;
      }

      group.classList.add('overflow');

      const cards = inner.querySelectorAll('.arrete-card');
      if (!cards.length) return;

      const cardH   = cards[0].offsetHeight;
      const gapPx   = parseFloat(getComputedStyle(inner).gap) || 6;
      const unitH   = cardH + gapPx;

      const visibles   = Math.max(1, Math.floor(groupH / unitH));
      const totalCards = cards.length;
      const positions  = [];
      for (let i = 0; i < totalCards; i += visibles) {
        positions.push(Math.min(i * unitH, innerH - groupH));
      }
      const pages  = [...new Set(positions)];
      const nbPages = pages.length;

      if (nbPages <= 1) {
        group.classList.remove('overflow');
        inner.style.transform = 'translateY(0)';
        return;
      }

      dotsEl.innerHTML = '';
      pages.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'scroll-dot' + (i === 0 ? ' active' : '');
        dotsEl.appendChild(d);
      });
      dotsEl.classList.add('visible');
      progBar.classList.add('visible');

      let currentPage = 0;

      function updateUI() {
        dotsEl.querySelectorAll('.scroll-dot').forEach((d, i) => {
          d.classList.toggle('active', i === currentPage);
        });
        const pct = nbPages <= 1 ? 100 : (currentPage / (nbPages - 1)) * 100;
        progFill.style.width = pct + '%';
      }

      function scrollToPage(pageIdx, onDone) {
        const targetY = pages[pageIdx];
        inner.classList.remove('no-transition');
        inner.style.transform = `translateY(${-targetY}px)`;
        const onEnd = () => {
          inner.removeEventListener('transitionend', onEnd);
          if (onDone) onDone();
        };
        inner.addEventListener('transitionend', onEnd);
      }

      // Temps de lecture : minimum 6 s, +1.1 s par carte visible — plus confortable sur grand écran
      const tempsLecture  = Math.max(6000, visibles * 1100);
      const tempsPauseBas = 3000;

      function cycle() {
        if (!scrollStates[groupId]) return;

        if (currentPage < nbPages - 1) {
          currentPage++;
          updateUI();
          scrollToPage(currentPage, () => {
            scrollStates[groupId].timer = setTimeout(cycle, tempsLecture);
          });
        } else {
          scrollStates[groupId].timer = setTimeout(() => {
            if (!scrollStates[groupId]) return;
            currentPage = 0;
            updateUI();
            scrollToPage(0, () => {
              scrollStates[groupId].timer = setTimeout(cycle, tempsLecture);
            });
          }, tempsPauseBas);
        }
      }

      scrollStates[groupId] = {};
      updateUI();
      scrollStates[groupId].timer = setTimeout(cycle, tempsLecture);
    });
  }

  // ===== MÉTÉO =====
  const WMO_ICONS = {
    0:'☀️',1:'🌤',2:'⛅',3:'☁️',
    45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',
    61:'🌧',63:'🌧',65:'🌧',71:'❄️',73:'❄️',75:'❄️',
    80:'🌦',81:'🌧',82:'⛈',95:'⛈',96:'⛈',99:'⛈'
  };
  const WMO_LABELS = {
    0:'Ensoleillé',1:'Peu nuageux',2:'Partiellement nuageux',3:'Couvert',
    45:'Brouillard',48:'Brouillard givrant',51:'Bruine légère',53:'Bruine',55:'Bruine forte',
    61:'Pluie légère',63:'Pluie',65:'Pluie forte',71:'Neige légère',73:'Neige',75:'Neige forte',
    80:'Averses légères',81:'Averses',82:'Averses fortes',95:'Orage',96:'Orage avec grêle',99:'Orage violent'
  };

  async function chargerMeteo() {
    try {
      const url = "https://api.open-meteo.com/v1/forecast?latitude=45.5228&longitude=4.8742&current=temperature_2m,weathercode&timezone=Europe%2FParis";
      const res  = await fetch(url);
      const data = await res.json();
      const tempActu = Math.round(data.current.temperature_2m * 10) / 10;
      const codeActu = data.current.weathercode;
      document.getElementById('m-temp').innerHTML = `${tempActu}<span class="unit">°C</span>`;
      document.getElementById('m-icon').textContent = WMO_ICONS[codeActu] || '🌤';
      document.getElementById('m-cond').textContent = WMO_LABELS[codeActu] || '—';
    } catch(e) {
      document.getElementById('m-cond').textContent = '⚠ Indisponible';
    }
  }

  // ===== DÉBIT RHÔNE =====
  const STATIONS = ["V303002002","V303002001"];
  async function chargerDebit(idx = 0) {
    if (idx >= STATIONS.length) {
      document.getElementById('rhone-debit').innerHTML = '—<span class="unit"> m³/s</span>';
      document.getElementById('rhone-level-fill').style.height = '0%';
      document.getElementById('rhone-level-pct').textContent = '—';
      return;
    }
    try {
      const res  = await fetch(`https://hubeau.eaufrance.fr/api/v2/hydrometrie/observations_tr?code_entite=${STATIONS[idx]}&grandeur_hydro=Q&size=1&sort=desc&fields=date_obs,resultat_obs`);
      const data = await res.json();
      if (data?.data?.length > 0) {
        const last = data.data[0];
        const m3s = (last.resultat_obs / 1000).toFixed(0);
        document.getElementById('rhone-debit').innerHTML = `${m3s}<span class="unit"> m³/s</span>`;
        const QMAX  = 4780;
        const QMOD  = 1060;
        const debit = parseInt(m3s);
        const pct   = Math.min(100, Math.max(1, (debit / QMAX) * 100));
        let fillColor;
        if (debit <= QMOD)   fillColor = 'var(--accent)';
        else if (pct < 50)   fillColor = 'var(--amber)';
        else                 fillColor = 'var(--red)';
        const fillEl = document.getElementById('rhone-level-fill');
        const pctEl  = document.getElementById('rhone-level-pct');
        fillEl.style.height = pct.toFixed(1) + '%';
        fillEl.style.background = fillColor;
        pctEl.textContent = Math.round(pct) + '%';
        pctEl.style.color = fillColor;
      } else { chargerDebit(idx+1); }
    } catch(e) { chargerDebit(idx+1); }
  }

  // ===== REFRESH AUTO À 7h01 ET 19h01 =====
  function verifierRefreshAuto() {
    const now = new Date();
    const h = now.getHours();
    const m = now.getMinutes();
    if ((h === 7 || h === 19) && m === 1) {
      location.reload();
    }
  }
  setInterval(verifierRefreshAuto, 60 * 1000);

  // ===== INIT =====
  calibrer(0, 0);
  chargerArretes();
  chargerMeteo();
  chargerDebit();
  setInterval(chargerArretes, 5  * 60 * 1000);
  setInterval(chargerMeteo,   30 * 60 * 1000);
  setInterval(chargerDebit,   10 * 60 * 1000);
  setInterval(chargerArretes, 3600000);

</script>
